# Configuration for Dramaturg — CEX loading, tokenization, and elision indexing

[input]
cex_path = "source-data/frogs-speech-speaker.cex"
text_urn = "urn:cts:greekLit:tlg0019.tlg009.fu.sp:" 
file_name = "Aristophanes_Frogs"
filter_paratext = "" # filter out passages with this string in the URN.
#cex_path = "source-data/demeter.cex"  
#text_urn = "urn:cts:greekLit:tlg0013.tlg002.fucex:"  
#file_name = "Homeric_Hymn_to_Demeter"
#cex_path = "source-data/herodotus.cex"
#text_urn = "urn:cts:greekLit:tlg0016.tlg001.grc:"
#file_name = "Herodotus"

[output]
lines_per_page = 25
output_dir = "html/pages"
template_dir = "../templates"
index_template = "index.html"
page_template = "reader_page.html"

[lexicon]
lsj_cex = "https://github.com/Eumaeus/cite_lsj_cex/raw/main/lsj_chicago.cex"

[morphology]
pos_data = "path/to/morpheus_output.tsv"

# NEW sections for this milestone
[processing]
data_root = "data"                       # base folder for all generated files
tokenized_dir = "tokenized"
indexes_dir = "indexes"
vocabulary_dir = "vocabulary"
tokenized_suffix = "_tokenized.cex"
elided_index_suffix = "_elided.tsv"
elided_histogram_suffix = "_elided_histogram.tsv"
word_histogram_suffix = "_word_histogram.tsv"
vocabulary_unicode_suffix = "_uc_vocabulary.txt"
vocabulary_beta_suffix = "_beta_vocabulary.txt"


[editorial]
elision_dict      = "source-data/editorial_dict_elision.tsv"
enclitics_dict    = "source-data/editorial-dict-enclitics.tsv"
anastrophe_dict   = "source-data/editorial_dict_anastrophe.tsv"

